version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    groups:
      typescript-ecosystem:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"
      tanstack-router-start:
        patterns:
          - "@tanstack/react-router"
          - "@tanstack/react-router-with-query"
          - "@tanstack/react-start"
      tanstack-query:
        patterns:
          - "@tanstack/query-*"
          - "@tanstack/react-query"
          - "@tanstack/react-query-*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "playwright"
    commit-message:
      prefix: "dependabot"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 25
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot"
      include: "scope"
