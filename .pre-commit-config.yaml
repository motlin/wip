repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
        # Exclude JSONC files (JSON with Comments) as they need comment support
        exclude: "tsconfig.*\\.json|\\.fallowrc\\.json"
      - id: check-toml
      - id: check-xml
      - id: end-of-file-fixer
        exclude: "pnpm-lock\\.yaml|^\\.idea/"
      - id: trailing-whitespace
        exclude: "pnpm-lock\\.yaml|^\\.idea/"
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        types: [yaml]
        exclude: "^(node_modules/|\\.llm/|\\.claude/|\\.remember/|\\.serena/|\\.playwright-mcp/|dist/|coverage/|storybook-static/|pnpm-lock\\.yaml)"

  - repo: local
    hooks:
      - id: vp-staged
        name: vp staged
        entry: vp staged
        language: system
        pass_filenames: false
        types: [file]
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: vp exec markdownlint-cli2
        language: system
        types: [markdown]
        exclude: "^(node_modules/|\\.llm/|\\.claude/|\\.remember/|\\.serena/|\\.playwright-mcp/|dist/|coverage/|storybook-static/|CLAUDE\\.md|AGENTS\\.md)"
      - id: fallow
        name: fallow
        entry: vp exec fallow fix --base HEAD --yes --no-create-config
        language: system
        pass_filenames: false
        types: [file]
