repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
        exclude: "tsconfig.*\\.json|package-lock\\.json"
      - id: check-toml
      - id: check-xml
      - id: end-of-file-fixer
        exclude: "package-lock\\.json|^\\.idea/"
      - id: trailing-whitespace
        exclude: "package-lock\\.json|^\\.idea/"
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: system
        types: [markdown]
        exclude: "^(node_modules/|\\.llm/|\\.claude/|\\.remember/|\\.serena/|\\.playwright-mcp/|dist/|coverage/|storybook-static/|CLAUDE\\.md|AGENTS\\.md)"
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
        exclude: "^(node_modules/|\\.llm/|\\.claude/|\\.remember/|\\.serena/|\\.playwright-mcp/|dist/|coverage/|storybook-static/|pnpm-lock\\.yaml)"
