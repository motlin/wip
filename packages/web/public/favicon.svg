  <rect x="22"  y="32" width="40" height="14" rx="4" fill="white" opacity="0.9"/>
  <rect x="22"  y="50" width="40" height="14" rx="4" fill="white" opacity="0.9"/>
  <rect x="22"  y="68" width="40" height="14" rx="4" fill="white" opacity="0.9"/>
  <rect x="22"  y="86" width="40" height="14" rx="4" fill="white" opacity="0.35"/>
  <rect x="22" y="104" width="40" height="14" rx="4" fill="white" opacity="0.35"/>
  <rect x="22" y="122" width="40" height="14" rx="4" fill="white" opacity="0.35"/>

  <!-- col 2 WIP — gap at row 2 -->
  <rect x="76"  y="24" width="48" height="152" rx="7" fill="#EF9F27"/>
  <rect x="80"  y="32" width="40" height="14" rx="4" fill="white" opacity="0.95"/>
