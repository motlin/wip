packages:
  - "packages/*"
allowBuilds:
  better-sqlite3: true
  esbuild: true
  protobufjs: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  vite-plus: 0.2.5
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # vite-plus-test hard-pins an older core; force one core version graph-wide,
  # otherwise vitest startup fails with InvalidArg (mixed core JS/native).
  "@voidzero-dev/vite-plus-core": "0.2.5"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
